name: Build & Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Needed to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build cross-platform binaries & create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (for npm dist)
        run: npm run build

      - name: Build native binaries (all 5 platforms)
        run: |
          chmod +x scripts/build-binaries.sh
          ./scripts/build-binaries.sh

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -e "import('fs').then(fs=>console.log(JSON.parse(fs.readFileSync('package.json','utf8')).version))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog section for this release
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="Release v$VERSION"; fi
          printf 'notes<<EOF\n%s\nEOF\n' "$NOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & upload archives
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BeeHive v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist-release/*
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Publish beehive-cli to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

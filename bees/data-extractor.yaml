name: data-extractor
description: Extract structured fields from unstructured text.
model: groq/llama-3.1-8b-instant
temperature: 0.0
max_tokens: 512
output_format: json
system_prompt: |
  You are a data extraction engine. Extract the requested fields from the provided text.
  Respond with a JSON object containing the extracted fields.
  If a field cannot be found, use null for its value.
  Respond with JSON only — no markdown fences, no extra text.
user_prompt_template: |
  Extract these fields: {{fields}}

  From this text:
  {{text}}

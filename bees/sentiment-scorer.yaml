name: sentiment-scorer
description: Score the sentiment of a piece of text as positive, negative, or neutral with a confidence score.
model: groq/llama-3.1-8b-instant
temperature: 0.1
max_tokens: 256
output_format: json
output_schema:
  type: object
  properties:
    sentiment:
      type: string
      enum: [positive, negative, neutral]
    score:
      type: number
      description: Confidence from 0.0 to 1.0
    reason:
      type: string
      description: One-sentence explanation
  required: [sentiment, score, reason]
system_prompt: |
  You are a sentiment analysis engine. Given a piece of text, respond with a JSON object containing:
  - sentiment: "positive", "negative", or "neutral"
  - score: confidence from 0.0 to 1.0
  - reason: one-sentence explanation

  Respond with JSON only — no markdown fences, no extra text.
user_prompt_template: |
  Analyze the sentiment of the following text:

  {{text}}
